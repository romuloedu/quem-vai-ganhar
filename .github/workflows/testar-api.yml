name: Testar API football-data.org

on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - name: Ver estrutura completa de um jogo
        run: |
          curl -s "https://api.football-data.org/v4/competitions/WC/matches?limit=2" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_DATA_API_KEY }}" \
            | python3 -c "
import json, sys
data = json.load(sys.stdin)
print('Total de jogos:', data['resultSet']['count'])
print()
jogo = data['matches'][0]
print('=== ESTRUTURA DO JOGO ===')
print(json.dumps(jogo, indent=2, ensure_ascii=False))
"
