name: Testar API football-data.org

on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar acesso à API
        run: |
          echo "Testando endpoint de competições..."
          curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
            "https://api.football-data.org/v4/competitions/WC/matches?status=SCHEDULED&limit=3" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_DATA_API_KEY }}" \
            | python3 -m json.tool 2>/dev/null || echo "(resposta não é JSON válido)"
