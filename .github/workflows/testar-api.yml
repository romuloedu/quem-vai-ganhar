name: Testar API football-data.org

on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar acesso à API
        run: |
          echo "=== RESPOSTA BRUTA ==="
          RESPONSE=$(curl -s -w "\n---\nHTTP_STATUS:%{http_code}" \
            "https://api.football-data.org/v4/competitions/WC/matches?limit=3" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_DATA_API_KEY }}")
          echo "$RESPONSE"
          echo ""
          echo "=== STATUS ==="
          echo "$RESPONSE" | grep "HTTP_STATUS"
