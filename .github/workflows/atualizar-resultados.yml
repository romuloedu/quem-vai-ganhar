name: Atualizar Resultados Copa 2026

on:
  schedule:
    # Cobre 14:45–07:45 UTC (toda a janela de jogos da Copa 2026)
    # Alguns jogos têm KO às 04:00 UTC (00:00 ET) com resultado disponível ~07:00 UTC
    - cron: '45 14 * * *'       # 14:45 UTC
    - cron: '*/15 15-23 * * *'  # 15:00–23:45 UTC
    - cron: '*/15 0-3 * * *'    # 00:00–03:45 UTC
    - cron: '*/30 4-7 * * *'    # 04:00–07:30 UTC (jogos tarde na América)
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar resultados finalizados
        id: buscar
        run: python scripts/buscar_resultados.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Atualizar modelo e previsões
        if: steps.buscar.outputs.new_results == 'true'
        run: python scripts/atualizar.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Injetar horários oficiais
        if: steps.buscar.outputs.agenda_changed == 'true' || steps.buscar.outputs.new_results == 'true'
        run: python scripts/injetar_horarios.py

      - name: Commit e push das mudanças
        if: steps.buscar.outputs.new_results == 'true' || steps.buscar.outputs.agenda_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/ index.html resultados.html
          git diff --cached --quiet || git commit -m "Atualiza resultados e previsões"
          git push
