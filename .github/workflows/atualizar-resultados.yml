name: Atualizar Resultados Copa 2026

on:
  schedule:
    # Cobre 14:50–07:50 UTC (toda a janela de jogos da Copa 2026)
    # A cada 10 min para capturar placares ao vivo desde o KO
    - cron: '50 14 * * *'       # 14:50 UTC (pré-abertura)
    - cron: '*/10 15-23 * * *'  # 15:00–23:50 UTC (a cada 10 min)
    - cron: '*/10 0-7 * * *'    # 00:00–07:50 UTC (a cada 10 min)
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar resultados finalizados
        id: buscar
        run: python scripts/buscar_resultados.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Atualizar modelo e previsões
        if: steps.buscar.outputs.new_results == 'true'
        run: python scripts/atualizar.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Injetar horários oficiais
        if: steps.buscar.outputs.agenda_changed == 'true' || steps.buscar.outputs.new_results == 'true'
        run: python scripts/injetar_horarios.py

      - name: Injetar placares ao vivo
        if: steps.buscar.outputs.live_changed == 'true' || steps.buscar.outputs.new_results == 'true'
        run: python scripts/injetar_ao_vivo.py

      - name: Commit e push das mudanças
        if: steps.buscar.outputs.new_results == 'true' || steps.buscar.outputs.agenda_changed == 'true' || steps.buscar.outputs.live_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/ index.html resultados.html
          git diff --cached --quiet || git commit -m "Atualiza placares e previsões"
          git push
